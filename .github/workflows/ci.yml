name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  delivery:
    name: Delivery Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell scripts
        run: |
          bash -n scripts/*.sh
          test -x scripts/init-mysql.sh
          test -x scripts/start-admin.sh
          test -x scripts/start-compose.sh
          test -x scripts/start-mq.sh
          test -x scripts/stop-compose.sh

      - name: Validate Docker Compose
        run: docker compose config

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        run: mvn -q test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/admin-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
