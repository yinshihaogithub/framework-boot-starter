<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>MQ 消息队列管理控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
        .header { background: #001529; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; font-weight: 500; }
        .header .refresh-btn { background: #1890ff; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .header .refresh-btn:hover { background: #40a9ff; }

        .container { padding: 24px; }

        /* 统计卡片 */
        .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .stat-card .num { font-size: 32px; font-weight: 700; }
        .stat-card .label { font-size: 13px; color: #8c8c8c; margin-top: 4px; }
        .stat-pending .num { color: #faad14; }
        .stat-retrying .num { color: #1890ff; }
        .stat-success .num { color: #52c41a; }
        .stat-exhausted .num { color: #ff4d4f; }
        .stat-total .num { color: #333; }

        /* 筛选栏 */
        .filter-bar { background: #fff; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .filter-bar label { font-size: 13px; color: #595959; }
        .filter-bar select, .filter-bar input { border: 1px solid #d9d9d9; border-radius: 4px; padding: 5px 10px; font-size: 13px; width: 140px; }
        .filter-bar .search-btn { background: #1890ff; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .filter-bar .batch-btn { background: #faad14; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .filter-bar .clean-btn { background: #ff4d4f; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; margin-left: auto; }

        /* 表格 */
        .table-container { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: #262626; border-bottom: 1px solid #e8e8e8; white-space: nowrap; }
        td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid #f0f0f0; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        tr:hover td { background: #fafafa; }

        /* 状态标签 */
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-pending { background: #fff7e6; color: #fa8c16; }
        .tag-retrying { background: #e6f7ff; color: #1890ff; }
        .tag-success { background: #f6ffed; color: #52c41a; }
        .tag-exhausted { background: #fff1f0; color: #ff4d4f; }
        .tag-manual { background: #f9f0ff; color: #722ed1; }

        /* 操作按钮 */
        .op-btn { border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 4px; }
        .op-retry { background: #1890ff; color: #fff; }
        .op-retry:hover { background: #40a9ff; }
        .op-detail { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
        .op-delete { background: #fff1f0; color: #ff4d4f; border: 1px solid #ffa39e; }

        /* 分页 */
        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; }
        .pagination .info { font-size: 13px; color: #8c8c8c; }
        .pagination .pages button { border: 1px solid #d9d9d9; background: #fff; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; margin: 0 2px; }
        .pagination .pages button.active { background: #1890ff; color: #fff; border-color: #1890ff; }
        .pagination .pages button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 详情弹窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); z-index: 1000; }
        .modal-overlay.show { display: flex; align-items: center; justify-content: center; }
        .modal { background: #fff; border-radius: 8px; width: 700px; max-height: 80vh; overflow-y: auto; }
        .modal-header { padding: 16px 24px; border-bottom: 1px solid #e8e8e8; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 16px; }
        .modal-close { cursor: pointer; font-size: 20px; color: #999; }
        .modal-body { padding: 24px; }
        .modal-body .row { display: flex; margin-bottom: 12px; }
        .modal-body .row .key { width: 120px; color: #8c8c8c; font-size: 13px; flex-shrink: 0; }
        .modal-body .row .val { font-size: 13px; word-break: break-all; flex: 1; }
        .modal-body pre { background: #f5f5f5; padding: 12px; border-radius: 4px; font-size: 12px; overflow-x: auto; max-height: 200px; }

        /* checkbox */
        .cb { width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>MQ 消息队列管理控制台</h1>
    <button class="refresh-btn" onclick="loadStats(); loadFailedMessages();">刷新</button>
</div>

<div class="container">
    <!-- 统计卡片 -->
    <div class="stats-row">
        <div class="stat-card stat-pending"><div class="num" id="stat-pending">0</div><div class="label">待重试</div></div>
        <div class="stat-card stat-retrying"><div class="num" id="stat-retrying">0</div><div class="label">重试中</div></div>
        <div class="stat-card stat-success"><div class="num" id="stat-success">0</div><div class="label">已成功</div></div>
        <div class="stat-card stat-exhausted"><div class="num" id="stat-exhausted">0</div><div class="label">已耗尽</div></div>
        <div class="stat-card stat-total"><div class="num" id="stat-total">0</div><div class="label">总计</div></div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <label>队列:</label>
        <input type="text" id="filter-queue" placeholder="队列名">
        <label>状态:</label>
        <select id="filter-status">
            <option value="">全部</option>
            <option value="PENDING">待重试</option>
            <option value="RETRYING">重试中</option>
            <option value="SUCCESS">已成功</option>
            <option value="EXHAUSTED">已耗尽</option>
            <option value="MANUAL">手动重发</option>
        </select>
        <label>业务Key:</label>
        <input type="text" id="filter-businessKey" placeholder="业务Key">
        <label>类型:</label>
        <input type="text" id="filter-type" placeholder="消息类型">
        <button class="search-btn" onclick="loadFailedMessages()">查询</button>
        <button class="batch-btn" onclick="batchRetry()">批量重发</button>
        <button class="clean-btn" onclick="cleanProcessed()">清空已处理</button>
    </div>

    <!-- 表格 -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" class="cb" id="select-all" onchange="selectAll(this)"></th>
                    <th>ID</th>
                    <th>消息ID</th>
                    <th>队列</th>
                    <th>类型</th>
                    <th>状态</th>
                    <th>重试次数</th>
                    <th>失败原因</th>
                    <th>下次重试</th>
                    <th>创建时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="msg-tbody"></tbody>
        </table>
        <div class="pagination">
            <div class="info" id="page-info">共 0 条</div>
            <div class="pages">
                <button onclick="changePage(-1)" id="prev-btn">上一页</button>
                <span id="current-page">1</span>
                <button onclick="changePage(1)" id="next-btn">下一页</button>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detail-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>消息详情</h3>
            <span class="modal-close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body" id="detail-body"></div>
    </div>
</div>

<script>
    const API = '/admin/mq';
    let currentPage = 1;
    let pageSize = 20;

    async function loadStats() {
        try {
            const resp = await fetch(API + '/stats');
            const data = await resp.json();
            if (data.code === 200) {
                document.getElementById('stat-pending').textContent = data.data.pendingCount;
                document.getElementById('stat-retrying').textContent = data.data.retryingCount;
                document.getElementById('stat-success').textContent = data.data.successCount;
                document.getElementById('stat-exhausted').textContent = data.data.exhaustedCount;
                document.getElementById('stat-total').textContent = data.data.totalCount;
            }
        } catch (e) { console.error(e); }
    }

    async function loadFailedMessages() {
        const queue = document.getElementById('filter-queue').value;
        const status = document.getElementById('filter-status').value;
        const businessKey = document.getElementById('filter-businessKey').value;
        const type = document.getElementById('filter-type').value;

        let url = API + '/failed-messages?pageNum=' + currentPage + '&pageSize=' + pageSize;
        if (queue) url += '&queueName=' + encodeURIComponent(queue);
        if (status) url += '&status=' + status;
        if (businessKey) url += '&businessKey=' + encodeURIComponent(businessKey);
        if (type) url += '&messageType=' + encodeURIComponent(type);

        try {
            const resp = await fetch(url);
            const data = await resp.json();
            if (data.code === 200) {
                renderTable(data.data.records || []);
                document.getElementById('page-info').textContent = '共 ' + data.data.total + ' 条';
                document.getElementById('current-page').textContent = currentPage;
            }
        } catch (e) { console.error(e); }
    }

    function renderTable(messages) {
        const tbody = document.getElementById('msg-tbody');
        if (messages.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:40px;color:#999;">暂无数据</td></tr>';
            return;
        }
        tbody.innerHTML = messages.map(m => `
            <tr>
                <td><input type="checkbox" class="cb msg-cb" value="${m.id}"></td>
                <td>${m.id}</td>
                <td title="${m.messageId}">${m.messageId ? m.messageId.substring(0, 12) + '...' : '-'}</td>
                <td>${m.queueName || '-'}</td>
                <td>${m.messageType || '-'}</td>
                <td><span class="tag tag-${m.status ? m.status.toLowerCase() : ''}">${statusText(m.status)}</span></td>
                <td>${m.retryCount}/${m.maxRetry}</td>
                <td title="${m.errorMessage}">${m.errorMessage ? m.errorMessage.substring(0, 40) + '...' : '-'}</td>
                <td>${formatTime(m.nextRetryTime)}</td>
                <td>${formatTime(m.createTime)}</td>
                <td>
                    <button class="op-btn op-retry" onclick="retryOne(${m.id})">重发</button>
                    <button class="op-btn op-detail" onclick="showDetail(${m.id})">详情</button>
                    <button class="op-btn op-delete" onclick="deleteOne(${m.id})">删除</button>
                </td>
            </tr>
        `).join('');
    }

    function statusText(s) {
        const map = { PENDING: '待重试', RETRYING: '重试中', SUCCESS: '已成功', EXHAUSTED: '已耗尽', MANUAL: '手动重发' };
        return map[s] || s;
    }

    function formatTime(t) {
        if (!t) return '-';
        return new Date(t).toLocaleString('zh-CN');
    }

    function selectAll(cb) {
        document.querySelectorAll('.msg-cb').forEach(c => c.checked = cb.checked);
    }

    async function retryOne(id) {
        if (!confirm('确认重发该消息？')) return;
        try {
            const resp = await fetch(API + '/failed-messages/' + id + '/retry?operator=admin', { method: 'POST' });
            const data = await resp.json();
            alert(data.message);
            loadStats(); loadFailedMessages();
        } catch (e) { alert('重发失败'); }
    }

    async function batchRetry() {
        const ids = Array.from(document.querySelectorAll('.msg-cb:checked')).map(cb => parseInt(cb.value));
        if (ids.length === 0) { alert('请选择要重发的消息'); return; }
        if (!confirm('确认批量重发 ' + ids.length + ' 条消息？')) return;
        try {
            const resp = await fetch(API + '/failed-messages/batch-retry', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: ids, operator: 'admin' })
            });
            const data = await resp.json();
            if (data.code === 200) {
                alert('成功: ' + data.data.success + ', 失败: ' + data.data.failed);
            } else { alert(data.message); }
            loadStats(); loadFailedMessages();
        } catch (e) { alert('批量重发失败'); }
    }

    async function deleteOne(id) {
        if (!confirm('确认删除该记录？')) return;
        try {
            await fetch(API + '/failed-messages/' + id, { method: 'DELETE' });
            loadFailedMessages();
        } catch (e) { alert('删除失败'); }
    }

    async function cleanProcessed() {
        if (!confirm('确认清空所有已处理（成功/耗尽/手动）记录？此操作不可撤销！')) return;
        try {
            const resp = await fetch(API + '/failed-messages/clean', { method: 'DELETE' });
            const data = await resp.json();
            alert(data.message);
            loadStats(); loadFailedMessages();
        } catch (e) { alert('清空失败'); }
    }

    async function showDetail(id) {
        try {
            const resp = await fetch(API + '/failed-messages/' + id);
            const data = await resp.json();
            if (data.code === 200) {
                const m = data.data;
                document.getElementById('detail-body').innerHTML = `
                    <div class="row"><div class="key">ID</div><div class="val">${m.id}</div></div>
                    <div class="row"><div class="key">消息ID</div><div class="val">${m.messageId || '-'}</div></div>
                    <div class="row"><div class="key">业务Key</div><div class="val">${m.businessKey || '-'}</div></div>
                    <div class="row"><div class="key">消息类型</div><div class="val">${m.messageType || '-'}</div></div>
                    <div class="row"><div class="key">交换机</div><div class="val">${m.exchange || '-'}</div></div>
                    <div class="row"><div class="key">路由键</div><div class="val">${m.routingKey || '-'}</div></div>
                    <div class="row"><div class="key">队列</div><div class="val">${m.queueName || '-'}</div></div>
                    <div class="row"><div class="key">状态</div><div class="val"><span class="tag tag-${m.status ? m.status.toLowerCase() : ''}">${statusText(m.status)}</span></div></div>
                    <div class="row"><div class="key">重试次数</div><div class="val">${m.retryCount} / ${m.maxRetry}</div></div>
                    <div class="row"><div class="key">来源</div><div class="val">${m.source || '-'}</div></div>
                    <div class="row"><div class="key">下次重试</div><div class="val">${formatTime(m.nextRetryTime)}</div></div>
                    <div class="row"><div class="key">创建时间</div><div class="val">${formatTime(m.createTime)}</div></div>
                    <div class="row"><div class="key">更新时间</div><div class="val">${formatTime(m.updateTime)}</div></div>
                    <div class="row"><div class="key">操作人</div><div class="val">${m.operator || '-'}</div></div>
                    <div class="row"><div class="key">失败原因</div><div class="val">${m.errorMessage || '-'}</div></div>
                    <div class="row"><div class="key">消息体</div></div>
                    <pre>${formatJson(m.payload)}</pre>
                `;
                document.getElementById('detail-modal').classList.add('show');
            }
        } catch (e) { alert('获取详情失败'); }
    }

    function formatJson(str) {
        if (!str) return '-';
        try { return JSON.stringify(JSON.parse(str), null, 2); } catch (e) { return str; }
    }

    function closeModal() {
        document.getElementById('detail-modal').classList.remove('show');
    }

    function changePage(delta) {
        const newPage = currentPage + delta;
        if (newPage < 1) return;
        currentPage = newPage;
        loadFailedMessages();
    }

    // 初始化
    loadStats();
    loadFailedMessages();
    // 30秒自动刷新统计
    setInterval(loadStats, 30000);
</script>
</body>
</html>
